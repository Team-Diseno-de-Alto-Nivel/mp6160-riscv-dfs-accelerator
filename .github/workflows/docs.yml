name: Build Paper

on:
  push:
    branches:
      - main
    paths:
      - 'docs/paper/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/paper/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: docs/paper

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'main' }}
          path: docs/paper/main.pdf
